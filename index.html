<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Nina Agency</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#0f1115;color:#fff}
    header{padding:16px;background:#161a22;font-size:20px;font-weight:600}
    main{display:grid;grid-template-columns:1fr 420px;height:calc(100vh - 56px)}
    section{padding:16px;overflow:auto}
    .panel{background:#161a22;border-radius:8px;padding:12px;margin-bottom:12px}
    iframe{width:100%;height:100%;border:none;border-radius:8px;background:#000}
  </style>
</head>
<body>
  <header>Nina Agency – dashboard</header>

  <main>
    
    <section>
      <div class="panel">
        <h3>Stav agentury</h3>
        <p>Appka běží. Další krok: napojení Supabase a zobrazení dat (users/messages/events).</p>
      </div>

      <div class="panel">
        <h3>Logy / statistiky</h3>
        <p id="supabaseStatus">Supabase: čekám…</p>
        <p><strong>Počet zpráv:</strong> <span id="msgCount">načítám…</span></p>
<div id="lastMessages"></div>
        <p>Zatím placeholder. Jakmile dáš anon key, ukážu ti reálný data.</p>
      </div>
    </section>

    <section>
   <div class="panel">
  <h3>Nina chat</h3>

  <a
    href="https://ninna-ray-chat--ninnaray.replit.app/"
    target="_blank"
    style="
      display:inline-block;
      padding:12px 16px;
      background:#8b5cf6;
      color:#fff;
      border-radius:8px;
      text-decoration:none;
      font-weight:600;
    "
  >
    Otevřít chat
  </a>
</div>
    </section>
  </main>
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://wygplsbeugmxlvtkvcdt.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_yvuK08HK61Qz1aG2S0LDeQ_kCZ8XCR3";
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadMessages() {
    const statusEl = document.getElementById("supabaseStatus");
    const countEl = document.getElementById("msgCount");
    const listEl = document.getElementById("lastMessages");

    statusEl.textContent = "Supabase: načítám messages…";

    const { data, error, count } = await client
      .from("messages")
      .select("*", { count: "exact" })
      .order("created_at", { ascending: false })
      .limit(5);

    if (error) {
      statusEl.textContent = "Supabase chyba: " + error.message;
      countEl.textContent = "—";
      listEl.textContent = "";
      return;
    }

    statusEl.textContent = "Supabase OK ✅";
    countEl.textContent = (count ?? data.length);

    listEl.innerHTML = data.map(m => `
      <div style="background:#161a22;border-radius:6px;padding:8px;margin-bottom:6px;font-size:14px">
        <div style="opacity:.7">${m.created_at ?? ""} ${m.platform ?? ""}</div>
        <div>${(m.content ?? m.message ?? JSON.stringify(m))}</div>
      </div>
    `).join("");
  }

  loadMessages();
</script>
</body>
</html>
