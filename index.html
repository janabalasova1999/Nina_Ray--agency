<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Nina Agency</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#0f1115;color:#fff}
    header{padding:16px;background:#161a22;font-size:20px;font-weight:600}
    main{display:grid;grid-template-columns:1fr 420px;height:calc(100vh - 56px)}
    section{padding:16px;overflow:auto}
    .panel{background:#161a22;border-radius:10px;padding:12px;margin-bottom:12px}
    .muted{opacity:.75}
    .card{background:#0f1115;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px;margin:8px 0}
    .btn{
      display:inline-block;
      padding:12px 16px;
      background:#8b5cf6;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:650;
    }
    @media (max-width: 900px){
      main{grid-template-columns:1fr; height:auto}
    }
  </style>
</head>
<body>
  <header>Nina Agency – dashboard</header>

  <main>
    <section>
      <div class="panel">
        <h3>Stav agentury</h3>
        <p class="muted" id="agencyStatus">Připraveno. Čekám na nové zprávy…</p>
      </div>

      <div class="panel">
        <h3>Logy / statistiky</h3>
        <p id="supabaseStatus">Supabase: čekám…</p>
        <p><strong>Počet zpráv:</strong> <span id="msgCount">—</span></p>
        <div id="lastMessages"></div>
      </div>

      <div class="panel">
        <h3>Doporučení</h3>
        <div id="recoList" class="muted">Zatím žádná doporučení.</div>
      </div>
    </section>

    <section>
      <div class="panel">
        <h3>Nina chat</h3>
        <a class="btn" href="https://ninna-ray-chat--ninnaray.replit.app/" target="_blank" rel="noopener">
          Otevřít chat
        </a>
      </div>
    </section>
  </main>

  <!-- Jediný zdroj Supabase logiky (bez duplicit, bez placeholderů) -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://wygplsbeugmxlvtkvcdt.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_yvuK08HK61Qz1aG2S0LDeQ_kCZ8XCR3";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById("supabaseStatus");
    const countEl  = document.getElementById("msgCount");
    const listEl   = document.getElementById("lastMessages");
    const recoEl   = document.getElementById("recoList");
    const agencyEl = document.getElementById("agencyStatus");

    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
      );
    }

    function renderMessages(rows){
      if (!rows?.length){
        listEl.innerHTML = `<div class="muted">Zatím nejsou žádné zprávy v tabulce <code>messages</code>.</div>`;
        return;
      }

      listEl.innerHTML = rows.map(m => `
        <div class="card">
          <div class="muted" style="font-size:12px">
            ${escapeHtml(m.created_at)} • ${escapeHtml(m.platform)} • ${escapeHtml(m.direction)}
          </div>
          <div style="margin-top:6px">${escapeHtml(m.content ?? m.message ?? "")}</div>
        </div>
      `).join("");
    }

    async function loadMessages(){
      statusEl.textContent = "Supabase: načítám…";

      const { data, error } = await supabase
        .from("messages")
        .select("created_at, platform, direction, content, message")
        .order("created_at", { ascending: false })
        .limit(10);

      if (error){
        statusEl.textContent = "Supabase chyba: " + error.message;
        countEl.textContent = "—";
        listEl.innerHTML = `<div class="muted">Nelze načíst messages.</div>`;
        agencyEl.textContent = "Chyba připojení k databázi.";
        return;
      }

      statusEl.textContent = "Supabase OK ✅";
      countEl.textContent = String(data.length);
      agencyEl.textContent = data.length ? "Živá data aktivní ✅" : "Připraveno. Zatím žádné nové zprávy.";
      renderMessages(data);
    }

    // připraveno na další krok (až budeme zapisovat recommendations)
    async function loadRecommendations(){
      const { data, error } = await supabase
        .from("recommendations")
        .select("created_at, action, reason")
        .order("created_at", { ascending: false })
        .limit(5);

      if (error){
        // když tabulka ještě není / RLS blokuje, nebudeme dělat paniku
        recoEl.textContent = "Zatím žádná doporučení.";
        return;
      }

      if (!data?.length){
        recoEl.textContent = "Zatím žádná doporučení.";
        return;
      }

      recoEl.innerHTML = data.map(r => `
        <div class="card">
          <div><strong>${escapeHtml(r.action)}</strong></div>
          <div class="muted">${escapeHtml(r.reason)}</div>
          <div class="muted" style="font-size:12px;margin-top:6px">${escapeHtml(r.created_at)}</div>
        </div>
      `).join("");
    }

    // první load
    await loadMessages();
    await loadRecommendations();

    // auto-refresh každých 10s (ať to fakt žije)
    setInterval(loadMessages, 10000);
  </script>

  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
